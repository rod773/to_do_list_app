<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal To-Do</title>
    <style>
        :root {
            --bg-top: #f1f5f9;
            --bg-bottom: #f1f5f9;
            --card-bg: #f8fafc;
            --card-inner: #ffffff;
            --fg: #0f172a;
            --secondary: #94a3b8;
            --accent: #4285f4;
            --completed: #5ccfa7;
            --danger: #ff5252;
            --border: #e2e8f0;
            --radius: 16px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-top: #0f172a;
                --bg-bottom: #0f172a;
                --card-bg: #1e293b;
                --card-inner: #334155;
                --fg: #f8fafc;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            color: var(--fg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .bg-wave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 360px;
            height: 640px;
            background: var(--card-bg);
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .header {
            text-align: center;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 25px 0 15px;
            color: #1e293b;
        }

        .calendar-card {
            background: var(--card-inner);
            margin: 0 20px 25px;
            padding: 20px 0 10px;
            border-radius: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }

        .date-header {
            padding: 0;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .date-header h2 {
            margin: 0;
            font-size: 0.9rem;
            color: #1e293b;
            font-weight: 800;
        }

        .nav-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #94a3b8;
            cursor: pointer;
            padding: 0 15px;
            transition: color 0.2s;
        }

        .nav-btn:hover {
            color: #4285f4;
        }

        .calendar-strip {
            display: flex;
            padding: 0 30px;
            margin-bottom: 20px;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .calendar-strip::-webkit-scrollbar { display: none; }

        .calendar-strip.grid-mode {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 15px 5px;
            padding: 0 20px;
            margin-bottom: 10px;
            overflow-x: hidden;
        }

        .grid-day {
            height: 36px;
            width: 36px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            border-radius: 8px;
        }

        .day-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 45px;
            padding: 12px 0;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .day-item .day-name { font-size: 0.65rem; color: var(--secondary); font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
        .day-item .day-num { font-size: 1rem; font-weight: 700; }

        .day-item.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 8px 15px rgba(66, 133, 244, 0.25);
        }

        .grid-day.active {
            background: #4285f4;
            color: white;
            font-weight: 700;
        }

        .grid-day.other-month {
            color: #cbd5e1;
        }

        .input-group {
            background: #f8fafc;
            margin: 0 20px 20px;
            padding: 8px 8px 8px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        #todo-input {
            border: none;
            background: transparent;
            flex: 1;
            outline: none;
            font-size: 0.9rem;
            color: #64748b;
        }

        #add-btn {
            background: #4285f4;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .todo-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 0 30px;
        }

        ul { list-style: none; padding: 0; margin: 0; }

        li {
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            padding: 15px 20px;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: var(--secondary);
            font-weight: 700;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid #e2e8f0;
            border-radius: 50%;
            margin-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        li.completed .checkbox {
            background: var(--completed);
            border-color: var(--completed);
        }

        li.completed .checkbox::after {
            content: "✓";
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .task-text {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e293b;
        }

        .btn-del {
            background: transparent;
            color: var(--danger);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<div class="bg-wave"></div>

<div class="container">
    <div class="header">Daily Tasks</div>
    <div class="calendar-card">
        <div class="date-header">
            <button id="prev-month" class="nav-btn">&lt;</button>
            <h2 id="current-date">May 2025</h2>
            <button id="next-month" class="nav-btn">&gt;</button>
        </div>
        <div class="calendar-strip grid-mode" id="calendar-strip"></div>
    </div>
    
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off">
        <button id="add-btn">+</button>
    </div>

    <div class="todo-list-container">
        <ul id="todo-list"></ul>
    </div>
</div>

<script>
    const input = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');
    const addBtn = document.getElementById('add-btn');
    const calendarStrip = document.getElementById('calendar-strip');
    const currentDateEl = document.getElementById('current-date');

    let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
    const getLocalDateStr = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    let selectedDate = getLocalDateStr(new Date());

    const renderCalendar = () => {
        calendarStrip.innerHTML = '';
        const now = new Date(selectedDate);
        const year = now.getFullYear();
        const month = now.getMonth();
        
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        const startDate = new Date(year, month, 1);
        startDate.setDate(startDate.getDate() - firstDayOfMonth);

        for (let i = 0; i < 42; i++) {
            const date = new Date(startDate);
            date.setDate(startDate.getDate() + i);
            const dateStr = getLocalDateStr(date);
            const dayEl = document.createElement('div');
            
            const isCurrentMonth = date.getMonth() === month;
            dayEl.className = `grid-day ${dateStr === selectedDate ? 'active' : ''} ${!isCurrentMonth ? 'other-month' : ''}`;
            
            dayEl.innerText = date.getDate();
            dayEl.onclick = () => {
                selectedDate = dateStr;
                updateHeader(date);
                renderCalendar();
                render();
            };
            calendarStrip.appendChild(dayEl);
        }
    };

    const saveAndRender = () => {
        localStorage.setItem('tasks', JSON.stringify(tasks));
        render();
    };

    const render = () => {
        todoList.innerHTML = '';
        
        tasks.forEach((task, index) => {
            const taskDate = task.date || getLocalDateStr(new Date());
            if (taskDate !== selectedDate) return;

            const li = document.createElement('li');
            if (task.completed) li.classList.add('completed');
            
            li.innerHTML = `
                <div class="checkbox" onclick="toggleTask(${index})"></div>
                <span class="task-text">${task.text}</span>
                <button class="btn-del" onclick="deleteTask(${index})">🗑</button>
            `;
            todoList.appendChild(li);
        });
    };

    const addTask = () => {
        const text = input.value.trim();
        if (!text) return;
        tasks.push({ text, completed: false, date: selectedDate });
        input.value = '';
        saveAndRender();
    };

    const changeMonth = (offset) => {
        const d = new Date(selectedDate);
        d.setDate(1); 
        d.setMonth(d.getMonth() + offset);
        selectedDate = getLocalDateStr(d);
        updateHeader(d);
        renderCalendar();
        render();
    };

    document.getElementById('prev-month').addEventListener('click', () => changeMonth(-1));
    document.getElementById('next-month').addEventListener('click', () => changeMonth(1));

    window.toggleTask = (index) => {
        tasks[index].completed = !tasks[index].completed;
        saveAndRender();
    };

    window.deleteTask = (index) => {
        tasks.splice(index, 1);
        saveAndRender();
    };

    addBtn.addEventListener('click', addTask);
    input.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTask();
    });

    const updateHeader = (date) => {
        currentDateEl.innerText = date.toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
    };

    updateHeader(new Date());
    renderCalendar();
    render();
</script>

</body>
</html>
